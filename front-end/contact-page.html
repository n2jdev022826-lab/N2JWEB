<script>
  // Initialize Leaflet map
  var map = L.map('map').setView([6.95508, 126.21655], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  var marker = L.marker([6.954942, 126.183737]).addTo(map);

  // Address popup
  var address = "Purok 3 Upper Tagawisan, Brgy. Badas, City of Mati, Davao Oriental 8200";
  marker.bindPopup(address);

  marker.on('mouseover', function (e) {
    this.openPopup();
  });
  marker.on('mouseout', function (e) {
    this.closePopup();
  });
</script>

<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const status = document.getElementById('formStatus');
  status.style.color = "#00c9c8";
  status.textContent = "Sending...";

  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: 'POST',
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {
    status.style.color = "#00c9c8";
    status.textContent = "Message sent successfully!";
    form.reset();
  } else {
    status.style.color = "#ff4d4f";
    status.textContent = "There was an error. Please try again.";
  }
});
</script>

<script>
const canvas = document.getElementById('bg-lines');
const ctx = canvas.getContext('2d');
let lines = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Create lines
function initLines() {
  lines = [];
  for (let i = 0; i < 18; i++) {
    lines.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      length: 120 + Math.random() * 180,
      speed: 0.3 + Math.random() * 0.7,
      angle: Math.random() * Math.PI * 2,
      width: 1 + Math.random() * 2,
      alpha: 0.08 + Math.random() * 0.12
    });
  }
}
initLines();
window.addEventListener('resize', initLines);

function animateLines() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let line of lines) {
    ctx.save();
    ctx.globalAlpha = line.alpha;
    ctx.strokeStyle = '#00c9c8';
    ctx.lineWidth = line.width;
    ctx.beginPath();
    ctx.moveTo(line.x, line.y);
    ctx.lineTo(
      line.x + Math.cos(line.angle) * line.length,
      line.y + Math.sin(line.angle) * line.length
    );
    ctx.stroke();
    ctx.restore();

    // Move line
    line.x += Math.cos(line.angle) * line.speed;
    line.y += Math.sin(line.angle) * line.speed;

    // Wrap around screen
    if (
      line.x > canvas.width + line.length ||
      line.x < -line.length ||
      line.y > canvas.height + line.length ||
      line.y < -line.length
    ) {
      line.x = Math.random() * canvas.width;
      line.y = Math.random() * canvas.height;
      line.angle = Math.random() * Math.PI * 2;
    }
  }
  requestAnimationFrame(animateLines);
}
animateLines();
</script>
